name: "SCD Core — Build Ticket Cache"

on:
  workflow_dispatch:
    inputs:
      max_tickets:
        description: "Max tickets to cache (0 = all, default 100)"
        required: false
        default: "100"
      resume:
        description: "Resume from last checkpoint?"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  build-cache:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # commit cache file back to main

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Pre-flight Jira connectivity check
        env:
          JIRA_EMAIL:     ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_BASE_URL:  ${{ secrets.JIRA_BASE_URL }}
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from core.jira_clients import JiraReadClient
          j = JiraReadClient()
          # Test 1: get_issue
          t = j.get_issue('SCD-141664', fields=['summary'])
          print('get_issue OK:', t['key'])
          # Test 2: search with simple JQL
          issues = j.search('project = SCD AND resolution is not EMPTY ORDER BY updated DESC', fields=['summary'], max_results=1)
          print('search OK:', issues[0]['key'] if issues else 'no results')
          "

      - name: Dump all fields from one ticket (field discovery)
        env:
          JIRA_EMAIL:     ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_BASE_URL:  ${{ secrets.JIRA_BASE_URL }}
        run: |
          python -c "
          import sys, json
          sys.path.insert(0, '.')
          from core.jira_clients import JiraReadClient
          j = JiraReadClient()
          data = j._search_jql({'jql': 'project = SCD AND resolution is not EMPTY ORDER BY updated DESC', 'maxResults': 1})
          issue = data['issues'][0]
          fields = issue['fields']
          print('=== TICKET:', issue['key'], '===')
          for k, v in sorted(fields.items()):
              if v is None or v == '' or v == [] or v == {}:
                  continue
              display = str(v)
              if len(display) > 300:
                  display = display[:300] + '...'
              print(f'{k}: {display}')
          "

      - name: Build ticket cache
        env:
          JIRA_EMAIL:       ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN:   ${{ secrets.JIRA_API_TOKEN }}
          JIRA_BASE_URL:    ${{ secrets.JIRA_BASE_URL }}
          MAX_CACHE_TICKETS: ${{ github.event.inputs.max_tickets }}
        run: |
          if [ "${{ github.event.inputs.resume }}" = "true" ]; then
            python scripts/build_ticket_cache.py --resume
          else
            python scripts/build_ticket_cache.py
          fi

      - name: Commit cache to repo
        run: |
          git config user.name  "scd-core-bot"
          git config user.email "scd-core-bot@users.noreply.github.com"
          git add knowledge/tickets_cache.jsonl.gz
          git add knowledge/cache_progress.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Cache unchanged — nothing to commit."
          else
            TICKET_COUNT=$(python -c "
          import gzip, json
          count = sum(1 for _ in gzip.open('knowledge/tickets_cache.jsonl.gz'))
          print(count)
          ")
            git commit -m "chore: update ticket cache [skip ci] — ${TICKET_COUNT} tickets"
            git push
          fi

      - name: Print summary
        run: |
          python -c "
          import gzip, json, os
          path = 'knowledge/tickets_cache.jsonl.gz'
          count = sum(1 for _ in gzip.open(path))
          size_mb = os.path.getsize(path) / (1024*1024)
          print(f'Tickets in cache: {count:,}')
          print(f'File size: {size_mb:.1f} MB (compressed)')
          "
