name: SCD Core — Scan & Propose

# MANUAL ONLY — no cron, no automatic triggers.
# Run from: GitHub Actions tab → "Run workflow"
on:
  workflow_dispatch:
    inputs:
      scope_note:
        description: 'Optional: note about this scan (for audit log)'
        required: false
        default: 'manual scan'

jobs:
  scan-and-propose:
    name: Scan & Propose
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt -q

      - name: Scan Jira + run modules + post proposals
        env:
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          PROPOSAL_HMAC_KEY: ${{ secrets.PROPOSAL_HMAC_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REPO: ${{ github.repository }}
        run: python -m core.orchestrator

      - name: Commit updated scan state
        run: |
          git config user.name "scd-core[bot]"
          git config user.email "scd-core@users.noreply.github.com"
          git add state/scan-state.json
          git diff --cached --quiet || git commit -m "state: update scan-state after run #${{ github.run_number }}"
          git push

      - name: Upload run trace
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-trace-${{ github.run_number }}
          path: run-trace/summary.json
          retention-days: 90
