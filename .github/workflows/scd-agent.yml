name: SCD Core Agent

on:
  schedule:
    # Runs every 10 minutes — always dry-run (scheduled runs cannot supply a passphrase)
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      live_passphrase:
        description: 'Enter live-mode passphrase to execute real Jira actions. Leave blank for dry-run.'
        required: false
        default: ''

jobs:
  run-agent:
    name: Process SCD Queue
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Create logs directory
        run: mkdir -p logs

      - name: Run SCD Core Agent
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          # Passphrase is supplied via manual workflow_dispatch input only.
          # Scheduled (cron) runs never have access to this — permanently dry-run.
          LIVE_PASSPHRASE_INPUT: ${{ github.event.inputs.live_passphrase }}
          LIVE_PASSPHRASE_SECRET: ${{ secrets.LIVE_PASSPHRASE }}
        run: python scd_agent.py

      - name: Upload audit log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-log-${{ github.run_number }}
          path: logs/
          retention-days: 30
