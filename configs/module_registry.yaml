modules:
  # --- NOTIFICATION MODULES (deterministic, profile-based) ---

  - module: spam
    description: Spam and junk tickets (topic field 10438).
    topic_field_ids: [10438]
    keywords: []

  - module: auto_notifications
    description: >
      All automated notification profiles: Revv sync errors (topic 10494),
      Automatic Notifications (topic 10404), and Assurant email senders
      (reporter @assurant.com). RingCentral (topic 10496) is explicitly
      excluded — those are real customer voicemail/call tickets.
      Confidence is profile-specific: Revv=0.90, AutoNotif=0.76,
      Assurant=0.96.
    topic_field_ids: [10404, 10494]
    reporter_email_domains: ["@assurant.com"]
    keywords: []

  # --- RESOLUTION MODULES ---

  - module: orphaned_transactions
    description: Orphaned / stuck payment transactions
    topic_field_ids: [10446]
    keywords: ["orphaned transaction", "orphan transaction", "stuck transaction",
               "transaction not linked", "missing transaction"]

  # General is the fallback — no routing rules needed, router falls through to it
  # - module: general
